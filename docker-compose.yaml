    services:
      api:
        image: mcr.microsoft.com/dotnet/sdk:10.0
        restart: unless-stopped
        working_dir: /src
        ports:
          - "5000:8080"
        dns:
          - 8.8.8.8
          - 1.1.1.1
        environment:
          - ASPNETCORE_ENVIRONMENT=Development
          - DOTNET_USE_POLLING_FILE_WATCHER=true
          - ASPNETCORE_URLS=http://0.0.0.0:8080
          #- ConnectionStrings__DefaultConnection=Server=db;Database=AppDB;User Id=sa;Password=Root1234!;TrustServerCertificate=True;
        volumes:
          - ./backend/srv:/src
          - ./Application-web:/app/webApp
          - uploads_data:/src/wwwroot/uploads
        command: dotnet watch run --no-launch-profile
        env_file:
          - .env

      web:
        build:
          context: ./Application-web
          dockerfile: Dockerfile
        ports:
          - "420:5173"  # Change 3000 to 5173 if you are using Vite
        volumes:
          - ./Application-web:/app
          - /app/node_modules # This "hides" the container's modules from being overwritten by your local ones
        environment:
          - CHOKIDAR_USEPOLLING=true # Forces the watcher to check for file changes
          - WDS_SOCKET_PORT=420      # Fixes WebSocket connection for HMR through the mapped port
        stdin_open: true 
        tty: true
        depends_on:
          - api       # nginx starts after api container is up     
      nginx:
        image: nginx:alpine
        restart: unless-stopped
        ports:
          - "421:80"
        volumes:
          - ./backend/srv/nginx/default.conf:/etc/nginx/conf.d/default.conf
          - uploads_data:/var/www/uploads        
        depends_on:
          - api

    volumes:
      uploads_data:
